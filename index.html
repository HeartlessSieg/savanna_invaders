<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVANNA INVADERS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;font-family:'Press Start 2P',monospace;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  #hud{width:min(840px,100vw);display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:#080000;border:2px solid #c83000;border-bottom:none;box-sizing:border-box;}
  #hud span{color:#ff6010;font-size:clamp(7px,1.8vw,13px);}
  #hud b{color:#ff9040;}
  #gameWrapper{position:relative;width:min(840px,100vw);aspect-ratio:840/720;border:2px solid #c83000;box-shadow:0 0 40px #ff400044,inset 0 0 60px #1a000088;overflow:hidden;background:#000;}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.93);}
  #overlay h1{color:#ff4010;font-size:clamp(10px,3.2vw,20px);text-shadow:0 0 20px #ff400088,3px 3px #6a1000;letter-spacing:2px;text-align:center;line-height:2;margin-bottom:6px;}
  .sub{color:#ff8030;font-size:clamp(4px,1.1vw,7px);text-align:center;line-height:2.4;margin-bottom:10px;}
  .btnrow{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
  .btn{padding:9px 16px;background:#c83000;color:#fff8ee;font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.2vw,8px);border:none;cursor:pointer;box-shadow:4px 4px #601000;transition:transform .1s;}
  .btn:hover{background:#ff4010;}
  .btn:active{transform:translate(2px,2px);box-shadow:2px 2px #601000;}
  .btn.p2{background:#005580;box-shadow:4px 4px #002030;}
  .btn.p2:hover{background:#0080b0;}
</style>
</head>
<body>
<div id="hud">
  <span>P1:<b id="s1">0</b></span>
  <span>SAVANNA INVADERS &nbsp;|&nbsp; HI:<b id="hiVal">0</b> &nbsp; W:<b id="waveVal">1</b></span>
  <span>P2:<b id="s2">—</b></span>
</div>
<div id="gameWrapper">
  <canvas id="gc" width="840" height="720"></canvas>
  <div id="overlay">
    <h1>SAVANNA<br>INVADERS</h1>
    <div class="sub">MUTANT ANIMALS INVADE THE SAVANNA!<br>DEFEND YOUR TERRITORY</div>
    <div class="btnrow">
      <button class="btn" onclick="startGame(1)">▶ 1 PLAYER</button>
      <button class="btn p2" onclick="startGame(2)">▶▶ 2 PLAYERS</button>
    </div>
    <div class="sub" style="margin-top:12px">P1(RED): A/D MOVE &nbsp; W=FIRE<br>P2(BLUE): ←→ MOVE &nbsp; SPACE=FIRE<br>MOBILE: DRAG=MOVE &nbsp; TAP=FIRE</div>
  </div>
</div>
<script>
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=840,H=720,P=3;

const COL={
  o1:'#ff4010',o2:'#ff6020',o3:'#ff8030',am:'#ffaa40',
  dim:'#661000',dimmer:'#330800',
  p1b:'#40ff80',p1g:'#80ffaa',
  p2b:'#40d0ff',p2g:'#80eeff',
  eb:'#ff2000',ebB:'#ff6600',
  sh:'#ff7020',shL:'#441808',shM:'#883010',
  sc:'#ff200009',
  boss1:'#cc2200',boss2:'#ff4400',boss3:'#ff8800',
};

// ── STATE
let state='idle',numPlayers=1;
let scores=[0,0],hiScore=0,lives=[3,3],wave=1;
let players,bullets,enemyBullets,invaders,shields,particles,scorePopups;
let invaderDir=1,invaderMoveTimer=0,invaderMoveInterval=40;
let ufoBoss=null,ufoTimer=0;
let frame=0,enemyShootTimer=0;
let bg=null;

// ── STATIC BG
function buildBG(){
  bg={terrain:[],grass:[],trees:[],river:[]};
  const r=n=>Math.floor(Math.random()*n);
  for(let i=0;i<55;i++) bg.terrain.push({x:r(W),y:r(H),w:12+r(36),h:3+r(13),c:['#3a1c06','#4a2408','#2e1604','#382008','#503010','#3e2204'][r(6)]});
  for(let i=0;i<75;i++) bg.grass.push({x:r(W),y:r(H),s:3+r(6),c:Math.random()<.5?'#7a5a10':'#5a3c08'});
  for(let i=0;i<26;i++) bg.trees.push({x:18+r(W-36),y:18+r(H-36),rx:5+r(14)});
  for(let ry=0;ry<H;ry+=3) bg.river.push({y:ry,x:Math.floor(Math.sin(ry*.022)*22)});
}

function drawBG(){
  ctx.fillStyle='#1e0e02';ctx.fillRect(0,0,W,H);
  bg.terrain.forEach(t=>{ctx.fillStyle=t.c;ctx.fillRect(t.x,t.y,t.w,t.h);});
  bg.grass.forEach(g=>{ctx.fillStyle=g.c;ctx.fillRect(g.x,g.y,g.s,Math.max(2,Math.ceil(g.s*.4)));ctx.fillRect(g.x+2,g.y-2,Math.max(1,g.s-2),2);});
  bg.trees.forEach(t=>{
    const r=t.rx;
    ctx.globalAlpha=.28;ctx.fillStyle='#0a0400';ctx.fillRect(t.x-r+2,t.y-r/2+3,r*2,r);
    ctx.globalAlpha=.65;ctx.fillStyle='#1a3808';ctx.fillRect(t.x-r,t.y-r/2,r*2,r);ctx.fillRect(t.x-r/2,t.y-r*.8,r,r*1.5);
    ctx.fillStyle='#254a0a';ctx.fillRect(t.x-r/3,t.y-r/3,Math.max(2,r/2),Math.max(1,r/3));
    ctx.globalAlpha=1;
  });
  const rx=W*.68;
  ctx.globalAlpha=.4;
  bg.river.forEach(pt=>{ctx.fillStyle='#1a3050';ctx.fillRect(Math.floor(rx+pt.x),pt.y,6,4);});
  ctx.fillStyle='#2a5080';
  bg.river.forEach((pt,i)=>{if((i+(frame>>2))%5===0)ctx.fillRect(Math.floor(rx+pt.x+1),pt.y+1,3,2);});
  ctx.globalAlpha=.45;ctx.fillStyle='#4a2c0a';ctx.fillRect(0,H*.74,W,13);
  ctx.fillStyle='#382008';for(let dx=0;dx<W;dx+=28)ctx.fillRect(dx,H*.74+5,14,3);
  ctx.globalAlpha=1;
  ctx.fillStyle=COL.sc;for(let sy=0;sy<H;sy+=3)ctx.fillRect(0,sy,W,1);
}

// ── PLAYERS
function initPlayers(){
  players=[];
  const base={w:33,h:22,cooldown:0,dead:false,deathTimer:0,lifeLost:false};
  // P1 = GREEN tank, left side, W/A/D controls
  const p1={...base,id:0,shootKey:'KeyW',leftKey:'KeyA',rightKey:'KeyD',bc:COL.p1b,bg:COL.p1g,bodyCol:'#20c030',turretCol:'#30e848',winCol:'#ccffcc',wheelCol:'#0a3010'};
  // P2 = BLUE tank, right side, arrows+space controls
  const p2={...base,id:1,shootKey:'Space',leftKey:'ArrowLeft',rightKey:'ArrowRight',bc:COL.p2b,bg:COL.p2g,bodyCol:'#0080b0',turretCol:'#00a0d0',winCol:'#80ffff',wheelCol:'#002030'};
  if(numPlayers===1){p1.x=W/2-16;p1.y=H-52;players.push(p1);}
  else{p1.x=W/4-16;p1.y=H-52;p2.x=W*3/4-16;p2.y=H-52;players.push(p1,p2);}
}

// ── INVADER GRID
// 1P: 5 rows x 13 cols (65 animals) — 3 bulk types + rare eagle top row
// 2P: 6 rows x 14 cols (84 animals) ~2.5x density feel with wider grid
const BULK_TYPES=['hippo','croc','warthog']; // 3 bulk animal types

function getGridDims(){
  // Bunkers sit at H-130. One row above bunkers ≈ H-175 for the bottom invader row.
  // Wave 1 starts at top (startY ~36). Each wave pushes startY down.
  // After ~8 waves the bottom row of animals spawns just above the bunkers.
  const bunkerY = H - 130;
  const g = numPlayers===2
    ? {rows:6, cols:14, startX:10, colW:48, rowH:42}
    : {rows:5, cols:13, startX:20, colW:50, rowH:44};
  const gridH = (g.rows - 1) * g.rowH; // pixel height of the entire grid
  const topMin  = 36;                    // earliest wave: top of screen
  const topMax  = bunkerY - gridH - 50;  // latest wave: bottom row just clears bunkers
  const waveProgress = Math.min(1, (wave - 1) / 8); // reaches max at wave 9
  g.startY = Math.floor(topMin + (topMax - topMin) * waveProgress);
  return g;
}

function getRowType(r,rows){
  if(r===0) return 'eagle';       // rare top row
  if(r===1) return 'gorilla';     // second row
  // bottom rows are the 3 bulk types cycling
  return BULK_TYPES[(r-2)%BULK_TYPES.length];
}

function getRowScore(r){
  // All animals score between 25–75, higher rows worth more
  const scores_=[75,60,50,40,30,25];
  return scores_[Math.min(r,5)];
}

function initInvaders(){
  invaders=[];
  const g=getGridDims();
  for(let r=0;r<g.rows;r++) for(let c=0;c<g.cols;c++){
    invaders.push({
      row:r,col:c,x:g.startX+c*g.colW,y:g.startY+r*g.rowH,
      type:getRowType(r,g.rows),alive:true,animFrame:0,animTimer:0,
      score:getRowScore(r),isBoss:false,hp:1,maxHp:1,
    });
  }
  // Add boss(es) for wave 5+
  spawnWaveBosses();
}

function spawnWaveBosses(){
  const g=getGridDims();
  if(wave>=5){
    const bossHp=2+Math.floor((wave-5)/5); // grows: 2hp at w5, 3 at w10, 4 at w15...
    invaders.push({
      row:-1,col:99,
      x:W/2-36,y:g.startY,           // spawns with the grid, not at y=20
      type:'boss_mammoth',alive:true,animFrame:0,animTimer:0,
      score:500+wave*20,isBoss:true,hp:bossHp,maxHp:bossHp,
      charging:false,chargeSpeed:0,
    });
  }
  if(wave>=10){
    invaders.push({
      row:-1,col:100,
      x:W/2+70,y:g.startY,
      type:'boss_chickduck',alive:true,animFrame:0,animTimer:0,
      score:800+wave*25,isBoss:true,hp:3+Math.floor((wave-10)/5),maxHp:3+Math.floor((wave-10)/5),
      charging:false,chargeSpeed:0,
    });
  }
  // Every 5 waves after 15: extra boss with +1 hp each time
  if(wave>=15&&(wave-15)%5===0){
    invaders.push({
      row:-1,col:101,
      x:W/2-110,y:g.startY,
      type:'boss_mammoth',alive:true,animFrame:0,animTimer:0,
      score:600+wave*30,isBoss:true,hp:2+Math.floor((wave-15)/5),maxHp:2+Math.floor((wave-15)/5),
      charging:false,chargeSpeed:0,
    });
  }
}

// ── SHIELDS
// Single row of 5 bunkers, horizontally centred in the play area
function getShieldRows(){
  // Shield width = 9 cols × 10px = 90px. Gap between 5 shields across 840px:
  // total shields width = 5×90 = 450, remaining = 390, gap = 390/6 = 65px each side/between
  const shieldW = 90; // 9 cells × cw10
  const totalW  = 5 * shieldW;
  const gap     = Math.floor((W - totalW) / 6);
  const positions = [];
  for(let i=0;i<5;i++) positions.push(gap + i*(shieldW+gap));
  const rows=[];
  rows.push({y:H-130,count:5,positions});
  if(wave>=4){
    // Wave 4+: one high row of 3, also centred
    const highShieldW=90,highTotalW=3*highShieldW;
    const highGap=Math.floor((W-highTotalW)/4);
    const highPos=[highGap,highGap*2+highShieldW,highGap*3+highShieldW*2];
    rows.push({y:Math.floor(H*0.32),count:3,positions:highPos});
  }
  return rows;
}

function initShields(){
  shields=[];
  const rows=getShieldRows();
  rows.forEach(row=>{
    row.positions.forEach(sx=>{
      const cells=[];
      for(let r=0;r<5;r++) for(let c=0;c<9;c++){
        if(r>=3&&c>=3&&c<=5) continue;
        cells.push({r,c,hp:Math.random()<0.35?2:1});
      }
      shields.push({x:sx,y:row.y,cells,cw:10,ch:7});
    });
  });
}

function initGame(np){
  numPlayers=np||1;scores=[0,0];lives=[3,3];wave=1;
  bullets=[];enemyBullets=[];particles=[];scorePopups=[];
  invaderDir=1;invaderMoveTimer=0;invaderMoveInterval=40;
  ufoBoss=null;ufoTimer=0;frame=0;enemyShootTimer=0;
  if(!bg)buildBG();
  initPlayers();initInvaders();initShields();updateHUD();
}

function nextWave(){
  wave++;bullets=[];enemyBullets=[];particles=[];scorePopups=[];
  invaderDir=1;invaderMoveTimer=0;
  invaderMoveInterval=Math.max(8,40-wave*3);
  ufoBoss=null;ufoTimer=0;enemyShootTimer=0;
  // Bonus life every other wave
  if(wave%2===0){
    lives[0]++;
    if(numPlayers===2) lives[1]++;
  }
  // Reset player positions & clear any mid-death state — do NOT re-create player objects
  // so we don't accidentally skip a pending life deduction
  players.forEach(pl=>{
    pl.dead=false;pl.deathTimer=0;pl.lifeLost=false;pl.cooldown=0;
    pl.x=numPlayers===1?(W/2-16):(pl.id===0?W/4-16:W*3/4-16);
    pl.y=H-52;
  });
  initInvaders();initShields();updateHUD();
}

function updateHUD(){
  document.getElementById('s1').textContent=scores[0];
  document.getElementById('s2').textContent=numPlayers===2?scores[1]:'—';
  document.getElementById('hiVal').textContent=hiScore;
  document.getElementById('waveVal').textContent=wave;
}

// ── PIXEL HELPER
function px(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}

// ── DRAW INVADERS
function drawInvader(inv){
  const x=Math.floor(inv.x),y=Math.floor(inv.y),f=inv.animFrame,p=P;
  if(inv.isBoss){drawBoss(inv);return;}
  const t=inv.type;

  if(t==='eagle'){
    const c=f===0?COL.o3:COL.am;
    px(x+p*3,y+p*2,p*6,p*3,c);
    px(x,y+p*(f===0?1:2),p*4,p*2,COL.o2);px(x+p*8,y+p*(f===0?1:2),p*4,p*2,COL.o2);
    px(x-p,y+p*(f===0?2:3),p*2,p,COL.o1);px(x+p*11,y+p*(f===0?2:3),p*2,p,COL.o1);
    px(x+p*4,y,p*4,p*3,c);px(x+p*5,y,p*2,p,COL.am);
    px(x+p*3,y+p*4,p,p*2,COL.am);px(x+p*8,y+p*4,p,p*2,COL.am);
    px(x+p*5,y+p,p,p,'#ff0000');

  }else if(t==='gorilla'){
    const c=f===0?COL.o2:COL.o3;
    px(x+p*2,y+p*2,p*8,p*7,c);px(x+p*3,y,p*6,p*4,c);
    px(x+(f===0?0:p),y+p*3,p*(f===0?3:2),p*3,COL.o1);
    px(x+p*(f===0?9:8),y+p*3,p*(f===0?3:2),p*3,COL.o1);
    px(x+(f===0?-p:0),y+p*5,p*2,p*2,COL.am);px(x+p*(f===0?10:9),y+p*5,p*2,p*2,COL.am);
    px(x+p*4,y+p,p,p,'#ff0000');px(x+p*7,y+p,p,p,'#ff0000');
    px(x+p*4,y+p*2,p*4,p,COL.dim);
    px(x+p*4,y+p*8,p*2,p*2,COL.dim);px(x+p*6,y+p*8,p*2,p*2,COL.dim);

  }else if(t==='elephant'){
    const c=f===0?COL.o2:COL.o3;
    px(x+p,y+p*2,p*8,p*6,c);px(x+p*7,y,p*5,p*5,c);
    px(x,y+p*2,p*3,f===0?p*4:p*3,COL.o1);
    px(x+p*10,y+p*3,p*2,p*3,c);px(x+p*(f===0?11:10),y+p*5,p*2,p*2,c);
    px(x+p*9,y+p*4,p*3,p,COL.am);
    px(x+p*9,y+p,p,p,'#ff0000');px(x+p*11,y+p,p,p,'#ff0000');
    px(x+p*2,y+p*7,p*2,p*3,COL.dim);px(x+p*5,y+p*7,p*2,p*3,COL.dim);
    px(x+p*2,y+p,p,p*2,COL.o1);px(x+p*4,y,p,p*2,COL.o1);px(x+p*6,y+p,p,p*2,COL.o1);

  }else if(t==='hippo'){
    const c=f===0?COL.o3:COL.am;
    px(x,y+p*3,p*12,p*5,c);px(x+p*2,y,p*8,p*5,c);
    if(f===0){px(x+p*2,y+p*3,p*8,p*2,COL.dim);px(x+p*3,y+p*4,p*6,p,'#cc0000');}
    px(x+p*3,y+p,p,p,'#ff0000');px(x+p*7,y+p,p,p,'#ff0000');
    px(x+p*3,y+p*3,p,p*2,COL.am);px(x+p*5,y+p*3,p,p*2,COL.am);px(x+p*7,y+p*3,p,p*2,COL.am);
    px(x+p*2,y+p*7,p*2,p*2,COL.dim);px(x+p*8,y+p*7,p*2,p*2,COL.dim);
    px(x+p*5,y+p*7,p,p*(f===0?2:3),f===0?'#ff6000':'#ff2000');

  }else if(t==='croc'){
    const c=f===0?COL.o1:COL.o2;
    px(x+p*2,y+p*3,p*10,p*3,c);px(x+p*9,y+p*2,p*5,p*3,c);
    px(x+p*13,y+p*2,p*2,p*2,COL.am);
    px(x,y+p*4,p*3,p*2,c);px(x-p,y+p*5,p*2,p,c);
    for(let i=0;i<4;i++)px(x+p*(3+i*2),y+p*(f===0?2:1),p,p*2,COL.o3);
    px(x+p*11,y+p*2,p,p,'#ff0000');
    px(x+p*3,y+p*5,p*2,p*2,COL.dim);px(x+p*7,y+p*5,p*2,p*2,COL.dim);

  }else if(t==='warthog'){
    const c=f===0?COL.o2:COL.o1;
    px(x+p*2,y+p*2,p*8,p*5,c);px(x+p*7,y+p,p*5,p*4,c);
    px(x+p*8,y-p,p,p*3,COL.am);px(x+p*10,y-p,p,p*3,COL.am);
    px(x+p*9,y+p,p,p,'#ff0000');px(x+p*8,y+p*2,p*3,p,COL.dim);
    for(let i=0;i<4;i++)px(x+p*(2+i*2),y+p*(f===0?1:0),p,p*2,COL.o3);
    px(x+p,y+p*2,p,p*3,f===0?COL.o3:COL.o1);
    px(x+p*3,y+p*6,p*2,p*2,COL.dim);px(x+p*6,y+p*6,p*2,p*2,COL.dim);
  }
}

// ── DRAW BOSS (4x size)
function drawBoss(inv){
  const x=Math.floor(inv.x),y=Math.floor(inv.y),f=inv.animFrame,p=P*2;
  const hp=inv.hp,mhp=inv.maxHp;
  const charging=inv.charging;

  if(inv.type==='boss_mammoth'){
    // Massive woolly mammoth — huge tusks, shaggy body, tiny eyes, trunk
    const c=charging?'#ff2000':(f===0?COL.boss2:COL.boss3);
    const s=charging?'#ff6600':'#cc3300';
    px(x+p,y+p*3,p*10,p*8,c);         // main body (shaggy)
    px(x,y+p*4,p*3,p*6,s);            // shaggy left flank
    px(x+p*9,y+p*4,p*3,p*6,s);        // shaggy right flank
    px(x+p*6,y,p*6,p*5,c);            // head
    // tusks — wide sweeping
    px(x+p*4,y+p*4,p*3,p,COL.am);     // left tusk root
    px(x+p*2,y+p*5,p*4,p,COL.am);     // left tusk sweep
    px(x+p*10,y+p*4,p*3,p,COL.am);    // right tusk root
    px(x+p*10,y+p*5,p*4,p,COL.am);    // right tusk sweep
    // trunk
    px(x+p*7,y+p*3,p*2,p*4,c);
    px(x+p*(f===0?6:8),y+p*6,p*3,p*2,c);
    // tiny eyes
    px(x+p*7,y+p,p*2,p*2,'#ff0000');
    // woolly top
    for(let i=0;i<5;i++) px(x+p*(6+i),y+(f===0?-p:0),p,p*2,s);
    // legs
    px(x+p*2,y+p*10,p*2,p*3,s);px(x+p*5,y+p*10,p*2,p*3,s);
    px(x+p*8,y+p*10,p*2,p*3,s);
    drawBossHPBar(x,y,inv);

  }else if(inv.type==='boss_chickduck'){
    // Mutant giant chicken-duck — feathered body, duck bill, chicken comb, webbed feet
    const c=charging?'#ff0000':(f===0?COL.boss1:COL.boss2);
    // round fluffy body
    px(x+p*2,y+p*3,p*9,p*8,c);
    px(x+p,y+p*4,p*11,p*6,c);
    // wing flap
    px(x+(f===0?0:p),y+p*(f===0?4:5),p*3,p*(f===0?4:3),COL.boss3);
    px(x+p*(f===0?10:9),y+p*(f===0?4:5),p*3,p*(f===0?4:3),COL.boss3);
    // head
    px(x+p*4,y,p*6,p*5,c);
    // duck bill (flat orange)
    px(x+p*8,y+p*2,p*4,p*2,'#ff8800');
    px(x+p*10,y+p*2,p*3,p,'#ffaa00');
    // chicken comb (red spikes on top)
    px(x+p*4,y-p*2,p*2,p*3,'#ff0000');
    px(x+p*6,y-p*3,p*2,p*4,'#ff0000');
    px(x+p*8,y-p*2,p*2,p*3,'#ff0000');
    // eyes — crazed
    px(x+p*5,y+p,p*2,p*2,'#ff0000');
    px(x+p*8,y+p,p,p,'#ffff00');
    // wattle
    px(x+p*7,y+p*3,p*2,p*2,'#cc0000');
    // webbed feet
    px(x+p*2,y+p*10,p*4,p*2,'#ff8800');px(x+p,y+p*11,p*5,p,'#ffaa00');
    px(x+p*7,y+p*10,p*4,p*2,'#ff8800');px(x+p*7,y+p*11,p*5,p,'#ffaa00');
    // tail feathers
    px(x,y+p*(f===0?5:6),p*2,p*3,COL.boss3);
    px(x-p,y+p*(f===0?4:5),p*2,p*2,COL.boss2);
    drawBossHPBar(x,y,inv);
  }
}

function drawBossHPBar(x,y,inv){
  const bw=72,bh=6;
  px(x,y-10,bw,bh,'#330000');
  px(x,y-10,Math.floor(bw*(inv.hp/inv.maxHp)),bh,inv.hp>2?'#00cc44':inv.hp>1?'#ffaa00':'#ff2200');
  ctx.fillStyle='#ffaa40';ctx.font='5px "Press Start 2P"';
  const label=inv.type==='boss_mammoth'?'MAMMOTH':inv.type==='boss_chickduck'?'CHICKDUCK':'BOSS';
  ctx.fillText(label,x,y-12);
}

// ── UFO
function drawUFO(ufo){
  const x=Math.floor(ufo.x),y=Math.floor(ufo.y),p=P,f=(frame%20<10)?0:1;
  px(x+p*3,y+p*2,p*8,p*3,COL.am);px(x+p,y+p*3,p*12,p*2,COL.o2);px(x+p*5,y,p*4,p*3,COL.o3);
  px(x,y+p*(f===0?2:3),p*4,p*2,COL.o1);px(x+p*10,y+p*(f===0?2:3),p*4,p*2,COL.o1);
  px(x+p*5,y+p,p,p,'#ff0000');px(x+p*8,y+p,p,p,'#ff0000');
  px(x+p*4,y+p*4,p,p*2,COL.am);px(x+p*9,y+p*4,p,p*2,COL.am);
  ctx.globalAlpha=.25+Math.sin(frame*.2)*.15;px(x+p*2,y+p*4,p*10,p*2,COL.o2);ctx.globalAlpha=1;
  // Score value hovering above the UFO
  ctx.fillStyle='#ffff80';ctx.font='6px "Press Start 2P"';
  ctx.fillText(ufo.score,x+8,y-3);
}

// ── PLAYER TANK
function drawTank(pl){
  // In 2-player mode: hide completely when dead. In 1-player: flash.
  if(pl.dead){
    if(numPlayers===2) return;               // 2P — disappear entirely
    if(Math.floor(pl.deathTimer/4)%2===0) return; // 1P — flash
  }
  const x=Math.floor(pl.x),y=Math.floor(pl.y),p=P;
  px(x,y+p*5,p*11,p*3,pl.wheelCol);px(x+p,y+p*4,p*9,p*2,pl.bodyCol);
  px(x+p*3,y+p*2,p*5,p*3,pl.turretCol);px(x+p*5,y,p*2,p*3,pl.turretCol);
  px(x+p*2,y+p*2,p*7,p*2,pl.turretCol);px(x+p*4,y+p*2,p*3,p,pl.winCol);
  px(x+p,y+p*6,p*2,p*2,pl.wheelCol);px(x+p*4,y+p*6,p*2,p*2,pl.wheelCol);px(x+p*7,y+p*6,p*2,p*2,pl.wheelCol);
}

// ── SHIELD
function drawShield(sh){
  sh.cells.forEach(cell=>{
    const cx=sh.x+cell.c*sh.cw,cy=sh.y+cell.r*sh.ch;
    px(cx,cy,sh.cw-1,sh.ch-1,cell.hp===2?COL.sh:COL.shL);
  });
}

// ── PARTICLES
function spawnExplosion(x,y,c1,c2,n=14){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:28,maxLife:28,color:Math.random()<.5?c1:c2,size:Math.random()<.3?4:2});
}

// ── ENEMY SHOOT
function enemyShoot(){
  const alive=invaders.filter(i=>i.alive);
  if(!alive.length)return;
  // bosses also shoot — fire from their position
  const bosses=alive.filter(i=>i.isBoss);
  bosses.forEach(b=>{
    if(Math.random()<.3+wave*.02){
      enemyBullets.push({x:b.x+36,y:b.y+48,vy:3+wave*.25,type:'boss',age:0});
    }
  });
  const normal=alive.filter(i=>!i.isBoss);
  if(!normal.length)return;
  const bottom={};
  normal.forEach(i=>{if(!bottom[i.col]||i.row>bottom[i.col].row)bottom[i.col]=i;});
  const shooters=Object.values(bottom);
  const s=shooters[Math.floor(Math.random()*shooters.length)];
  enemyBullets.push({x:s.x+22,y:s.y+28,vy:2.6+wave*.3,type:Math.random()<.28?'zigzag':'straight',age:0});
}

// ── PLAYER SHOOT
function playerShoot(pl){
  if(pl.dead||pl.cooldown>0)return;
  if(bullets.filter(b=>b.owner===pl.id).length>=1)return;
  bullets.push({x:pl.x+15,y:pl.y,vy:-15,player:true,owner:pl.id,bc:pl.bc,bg:pl.bg});
  pl.cooldown=42; // slower fire rate
}

// ── COLLISION
function rectHit(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function checkBulletShield(bx,by,bw,bh){
  for(const sh of shields){
    for(let i=sh.cells.length-1;i>=0;i--){
      const cell=sh.cells[i];
      const cx=sh.x+cell.c*sh.cw,cy=sh.y+cell.r*sh.ch;
      if(rectHit(bx,by,bw,bh,cx,cy,sh.cw-1,sh.ch-1)){cell.hp--;if(cell.hp<=0)sh.cells.splice(i,1);return true;}
    }
  }
  return false;
}

// ── GAME FLOW
function startGame(np){document.getElementById('overlay').style.display='none';initGame(np);state='running';}
function continueWave(){document.getElementById('overlay').style.display='none';nextWave();state='running';}
function showOverlay(html){const ov=document.getElementById('overlay');ov.style.display='flex';ov.innerHTML=html;}

function gameOver(win){
  state=win?'win':'dead';
  const total=scores[0]+scores[1];
  if(total>hiScore)hiScore=total;
  updateHUD();
  setTimeout(()=>{
    if(win){
      showOverlay(`<h1>WAVE ${wave}<br>CLEARED!</h1>
        <div class="sub">P1:${scores[0]}${numPlayers===2?' P2:'+scores[1]:''}</div>
        <div class="btnrow"><button class="btn" onclick="continueWave()">▶ WAVE ${wave+1}</button><button class="btn" onclick="showStart()">MENU</button></div>`);
    }else{
      showOverlay(`<h1>OVERRUN!</h1>
        <div class="sub">Wave:${wave} Score:${total}${total>=hiScore&&total>0?'<br>✦ HI-SCORE ✦':''}</div>
        <div class="btnrow"><button class="btn" onclick="startGame(${numPlayers})">▶ RETRY</button><button class="btn" onclick="showStart()">MENU</button></div>`);
    }
  },900);
}

function showStart(){
  showOverlay(`<h1>SAVANNA<br>INVADERS</h1>
    <div class="sub">MUTANT ANIMALS INVADE!</div>
    <div class="btnrow"><button class="btn" onclick="startGame(1)">▶ 1 PLAYER</button><button class="btn p2" onclick="startGame(2)">▶▶ 2 PLAYERS</button></div>
    <div class="sub" style="margin-top:12px">P1(RED):A/D MOVE &nbsp; W=FIRE<br>P2(BLUE):←→ MOVE &nbsp; SPACE=FIRE</div>`);
}

// ── MAIN LOOP
function loop(){
  requestAnimationFrame(loop);
  frame++;
  if(bg)drawBG();else{ctx.fillStyle='#1e0e02';ctx.fillRect(0,0,W,H);}

  if(state==='running'){

    // Move players + auto-fire on held key
    players.forEach(pl=>{
      if(!pl.dead){
        if(keys[pl.leftKey])pl.x=Math.max(0,pl.x-4);
        if(keys[pl.rightKey])pl.x=Math.min(W-36,pl.x+4);
        if(pl.cooldown>0)pl.cooldown--;
        // Auto-fire: continuously shoot while key held
        if(keys[pl.shootKey])playerShoot(pl);
      }else if(!pl.lifeLost){
        // lifeLost flag prevents double-docking
        pl.deathTimer++;
        if(pl.deathTimer>90){
          pl.lifeLost=true;
          lives[pl.id]=Math.max(0,lives[pl.id]-1);
          updateHUD();
          if(lives[pl.id]<=0){
            const allDead=numPlayers===1||players.every(p=>lives[p.id]<=0);
            if(allDead&&state==='running'){gameOver(false);return;}
          }else{
            pl.dead=false;pl.deathTimer=0;pl.lifeLost=false;enemyBullets=[];
          }
        }
      }
    });

    // Count alive normals vs bosses
    const aliveNormal=invaders.filter(i=>i.alive&&!i.isBoss);
    const aliveBosses=invaders.filter(i=>i.alive&&i.isBoss);
    const aliveAll=invaders.filter(i=>i.alive);
    const totalNormal=invaders.filter(i=>!i.isBoss).length;

    // Boss charging: if boss is LAST alive, charge fast downward
    aliveBosses.forEach(boss=>{
      if(aliveNormal.length===0){
        boss.charging=true;
        boss.chargeSpeed=(boss.chargeSpeed||0);
        boss.chargeSpeed=Math.min(10,boss.chargeSpeed+0.05);
        boss.y+=boss.chargeSpeed;
        boss.animTimer++;if(boss.animTimer>3){boss.animFrame=(boss.animFrame+1)%2;boss.animTimer=0;}
        if(boss.y+80>=players[0].y){gameOver(false);return;}
      }
    });

    // Move normal invader grid
    invaderMoveTimer++;
    const speedFraction=aliveNormal.length>0?Math.max(0.04,aliveNormal.length/Math.max(1,totalNormal)):1;
    const lastFew=aliveNormal.length>0&&aliveNormal.length<=6;
    // Smoother ramp: lerp between normal speed and max hyper speed based on how few remain
    const hyperFrac=lastFew?Math.max(0,(6-aliveNormal.length)/6):0;
    const baseInterval=Math.max(4,Math.floor(invaderMoveInterval*speedFraction));
    const dynInterval=Math.max(2,Math.floor(baseInterval*(1-hyperFrac*0.7)));
    const baseStep=10;
    const step=Math.round(baseStep+(hyperFrac*14)); // 10px normal → up to 24px at last animal

    if(invaderMoveTimer>=dynInterval&&aliveNormal.length>0){
      invaderMoveTimer=0;
      let edgeHit=false;
      aliveNormal.forEach(inv=>{
        inv.x+=invaderDir*step;
        if(inv.x>W-52||inv.x<6)edgeHit=true;
        inv.animTimer++;
        if(inv.animTimer>4){inv.animFrame=(inv.animFrame+1)%2;inv.animTimer=0;}
      });
      // Bosses march with the grid (when not charging)
      aliveBosses.forEach(boss=>{
        if(!boss.charging){
          boss.x+=invaderDir*step;
          boss.animTimer++;if(boss.animTimer>5){boss.animFrame=(boss.animFrame+1)%2;boss.animTimer=0;}
        }
      });
      if(edgeHit){
        invaderDir*=-1;
        aliveNormal.forEach(inv=>{inv.y+=lastFew?22:14;});
        aliveBosses.forEach(boss=>{if(!boss.charging)boss.y+=lastFew?22:14;});
      }
    }

    // Invaders reach player
    aliveAll.forEach(inv=>{if(inv.y+40>=players[0].y&&!inv.isBoss)gameOver(false);});

    // Invaders crush shield cells they overlap as they march through
    aliveAll.forEach(inv=>{
      const iw=inv.isBoss?72:48,ih=inv.isBoss?60:36;
      shields.forEach(sh=>{
        for(let i=sh.cells.length-1;i>=0;i--){
          const cell=sh.cells[i];
          const cx=sh.x+cell.c*sh.cw,cy=sh.y+cell.r*sh.ch;
          if(rectHit(inv.x,inv.y,iw,ih,cx,cy,sh.cw,sh.ch)){
            sh.cells.splice(i,1);
          }
        }
      });
    });

    // UFO — rarer appearance, random score value each time
    ufoTimer++;
    if(!ufoBoss&&ufoTimer>900+Math.random()*600){
      const ufoScores=[50,100,150,200,250,300];
      ufoBoss={x:-60,y:20,vx:2.5+wave*.15,score:ufoScores[Math.floor(Math.random()*ufoScores.length)]};
      ufoTimer=0;
    }
    if(ufoBoss){ufoBoss.x+=ufoBoss.vx;if(ufoBoss.x>W+70)ufoBoss=null;}

    // Enemy shoot
    enemyShootTimer++;
    const shootInterval=Math.max(55,140-wave*9-Math.floor((totalNormal-aliveNormal.length)*.9));
    if(enemyShootTimer>=shootInterval){enemyShootTimer=0;enemyShoot();if(aliveNormal.length<8)enemyShoot();}

    // Move bullets
    bullets=bullets.filter(b=>{b.y+=b.vy;return b.y>-10&&b.y<H+10;});
    enemyBullets=enemyBullets.filter(b=>{
      b.age++;
      if(b.type==='zigzag')b.x+=Math.sin(b.age*.28)*2.2;
      b.y+=b.vy;return b.y<H+10;
    });

    // Bullets vs shields
    bullets=bullets.filter(b=>{
      if(!b.player)return true;
      if(checkBulletShield(b.x-2,b.y-4,4,8)){spawnExplosion(b.x,b.y,COL.sh,COL.o1,5);return false;}
      return true;
    });
    enemyBullets=enemyBullets.filter(b=>{
      if(checkBulletShield(b.x-2,b.y-4,4,8)){spawnExplosion(b.x,b.y,COL.shM,COL.o1,4);return false;}
      return true;
    });

    // Bullets vs invaders (including bosses)
    bullets=bullets.filter(b=>{
      if(!b.player)return true;
      for(const inv of invaders){
        if(!inv.alive)continue;
        const hitW=inv.isBoss?72:48,hitH=inv.isBoss?60:36;
        if(rectHit(b.x-3,b.y-6,6,10,inv.x,inv.y,hitW,hitH)){
          inv.hp--;
          if(inv.hp<=0){
            inv.alive=false;scores[b.owner]+=inv.score;updateHUD();
            spawnExplosion(inv.x+(inv.isBoss?36:22),inv.y+(inv.isBoss?30:16),COL.o2,COL.am,inv.isBoss?32:18);
          }else{
            // Boss hit but not dead — flash
            spawnExplosion(inv.x+36,inv.y+30,COL.boss1,COL.boss3,10);
            scores[b.owner]+=Math.floor(inv.score/inv.maxHp);updateHUD();
          }
          if(!invaders.some(i=>i.alive)){setTimeout(()=>gameOver(true),1200);}
          return false;
        }
      }
      if(ufoBoss&&rectHit(b.x-3,b.y-6,6,10,ufoBoss.x,ufoBoss.y,54,24)){
        const pts=ufoBoss.score;
        scores[b.owner]+=pts;updateHUD();
        spawnExplosion(ufoBoss.x+27,ufoBoss.y+12,COL.am,'#ffffff',24);
        scorePopups.push({x:ufoBoss.x+10,y:ufoBoss.y,text:'+'+pts,life:60,maxLife:60,color:'#ffffff'});
        ufoBoss=null;return false;
      }
      return true;
    });

    // Enemy bullets vs players
    players.forEach(pl=>{
      if(pl.dead)return;
      enemyBullets=enemyBullets.filter(b=>{
        if(rectHit(b.x-3,b.y-6,6,12,pl.x,pl.y,36,28)){
          pl.dead=true;pl.deathTimer=0;
          spawnExplosion(pl.x+18,pl.y+14,COL.o1,COL.am,28);
          return false;
        }
        return true;
      });
    });

    // Particles
    particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.93;pt.vy*=.93;pt.life--;ctx.globalAlpha=pt.life/pt.maxLife;ctx.fillStyle=pt.color;ctx.fillRect(Math.floor(pt.x),Math.floor(pt.y),pt.size,pt.size);});
    ctx.globalAlpha=1;
    particles=particles.filter(p=>p.life>0);

    // Score popups (float upward)
    if(!scorePopups)scorePopups=[];
    scorePopups.forEach(sp=>{sp.y-=0.6;sp.life--;ctx.globalAlpha=sp.life/sp.maxLife;ctx.fillStyle=sp.color;ctx.font='7px "Press Start 2P"';ctx.fillText(sp.text,Math.floor(sp.x),Math.floor(sp.y));});
    ctx.globalAlpha=1;
    scorePopups=scorePopups.filter(sp=>sp.life>0);
  }

  // ── DRAW
  shields.forEach(drawShield);
  invaders.forEach(inv=>{if(inv.alive)drawInvader(inv);});
  if(ufoBoss)drawUFO(ufoBoss);
  players.forEach(drawTank);

  bullets.forEach(b=>{
    if(!b.player)return;
    ctx.fillStyle=b.bc;ctx.fillRect(Math.floor(b.x)-1,Math.floor(b.y)-6,3,12);
    ctx.globalAlpha=.4;ctx.fillStyle=b.bg;ctx.fillRect(Math.floor(b.x)-2,Math.floor(b.y)-6,5,12);ctx.globalAlpha=1;
  });

  enemyBullets.forEach(b=>{
    const isB=b.type==='boss';
    ctx.fillStyle=isB?'#ff4400':COL.eb;
    if(b.type==='zigzag'){
      ctx.fillRect(Math.floor(b.x)-1,Math.floor(b.y)-4,3,4);ctx.fillRect(Math.floor(b.x)+1,Math.floor(b.y),3,4);
      ctx.globalAlpha=.5;ctx.fillStyle=COL.ebB;ctx.fillRect(Math.floor(b.x)-2,Math.floor(b.y)-4,5,8);ctx.globalAlpha=1;
    }else if(isB){
      ctx.fillRect(Math.floor(b.x)-2,Math.floor(b.y)-8,5,16);
      ctx.globalAlpha=.5;ctx.fillStyle='#ff8800';ctx.fillRect(Math.floor(b.x)-4,Math.floor(b.y)-8,9,16);ctx.globalAlpha=1;
    }else{
      ctx.fillRect(Math.floor(b.x)-1,Math.floor(b.y)-6,3,12);
      ctx.globalAlpha=.4;ctx.fillStyle=COL.ebB;ctx.fillRect(Math.floor(b.x)-2,Math.floor(b.y)-6,5,12);ctx.globalAlpha=1;
    }
  });

  // Bottom HUD
  ctx.fillStyle='#080000';ctx.fillRect(0,H-22,W,22);
  ctx.fillStyle=COL.dim;ctx.fillRect(0,H-23,W,1);
  ctx.fillStyle=COL.o2;ctx.font='7px "Press Start 2P"';ctx.fillText(`WAVE ${wave}`,W/2-24,H-8);

  for(let i=0;i<Math.max(0,lives[0]);i++){const lx=8+i*20,ly=H-18;px(lx+3,ly+1,4,3,'#20c030');px(lx,ly+3,10,5,'#30e848');}
  if(numPlayers===2){
    for(let i=0;i<Math.max(0,lives[1]);i++){const lx=W-28-i*20,ly=H-18;px(lx+3,ly+1,4,3,'#0080b0');px(lx,ly+3,10,5,'#00a0d0');}
  }
}

// ── CONTROLS
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  // Prevent space/W from scrolling page
  if(e.code==='Space'||e.code==='KeyW') e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state==='running'){const p1=players&&players.find(p=>p.id===0);if(p1)playerShoot(p1);}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();const tx=(e.touches[0].clientX-rect.left)/rect.width*W;const p1=players&&players.find(p=>p.id===0);if(p1)p1.x=Math.max(0,Math.min(W-36,tx-18));},{passive:false});

buildBG();requestAnimationFrame(loop);
</script>
